# Revo OS v1.5.0 — Network Configuration
#
# Copy this file to /revo/etc/network.conf for persistent static IP.
# Leave values empty to use DHCP (default).
#
# Format: KEY="value" (bash-compatible, sourced by init script)

# ─── Interface Configuration ───
# Set to "dhcp" for automatic, or configure static below
NETWORK_MODE="dhcp"

# ─── Static IP (only used if NETWORK_MODE="static") ───
STATIC_IP="192.168.1.100"
STATIC_NETMASK="255.255.255.0"
STATIC_GATEWAY="192.168.1.1"
STATIC_DNS="1.1.1.1 8.8.8.8"
STATIC_INTERFACE="eth0"

# ─── Hostname ───
HOSTNAME="revo"

# ─── SSH Port ───
# Dropbear SSH server port (default 2222, non-root)
SSH_PORT="2222"

# ─── WireGuard (optional) ───
# Set WG_ENABLE="yes" to start WireGuard at boot
WG_ENABLE="no"
WG_INTERFACE="wg0"
WG_CONFIG="/revo/etc/wg0.conf"
